<!DOCTYPE html>
<html lang="es">

<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<link rel="icon" href="favicon.ico">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DealDesk — M&A Intelligence para LATAM</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/styles.css">

</head>

<body>

<div class="shell">

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<!-- MAIN -->
<main class="main">

<div id="topbar-container"></div>

<div class="content" id="app-content"></div>

</main>

</div>

<script src="../js/controlador-navegacion.js"></script>
<script src="../js/utilidades-ui.js"></script>

<script src="../js/herramienta-comparables.js"></script>
<script src="../js/herramienta-dcf-wacc.js"></script>
<script src="../js/herramienta-precedentes.js"></script>
<script src="../js/herramienta-ranking-bcra.js"></script>
<script src="../js/herramienta-bcra-intelligence.js"></script>
<script src="/js/herramienta-equity-research.js"></script>
<script>

async function loadComponent(id, file) {
    const res = await fetch(file);
    const html = await res.text();
    document.getElementById(id).innerHTML = html;
}

async function loadView(file) {
    const res = await fetch(file);
    const html = await res.text();
    document.getElementById("app-content").innerHTML = html;
}

window.addEventListener("DOMContentLoaded", async () => {

    await loadComponent(
        "sidebar-container",
        "components/sidebar.html"
    );

    await loadComponent(
        "topbar-container",
        "components/topbar.html"
    );

    await loadView(
        "components/home.html"
    );

});
async function loadHome(){
  const res = await fetch("components/home.html");
  const html = await res.text();
  document.getElementById("app-content").innerHTML = html;
}

loadHome()
</script>

</body>
</html>
